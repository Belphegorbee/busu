<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal</title>

<style>
:root {
  --primary: #2e7d32;
  --bg: #f4f6f8;
  --card: #ffffff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
}

header {
  background: var(--primary);
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

main {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: var(--card);
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  overflow: hidden;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  background: var(--primary);
  color: white;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* ===================== */
/* KARYAWAN GRID */
/* ===================== */
.list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 10px;
}

.karyawan-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  cursor: pointer;
  transition: 0.2s;
  background: #fafafa;
}

.karyawan-item:hover {
  background: #f0f0f0;
}

.karyawan-item.active {
  border: 1px solid var(--primary);
  background: #e8f5e9;
}

.karyawan-item:active {
  transform: scale(0.97);
}

.karyawan-item input {
  width: auto;
}

/* LOADING */
#loading {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:18px;
  z-index:999;
}

/* TOAST */
#toast {
  position: fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#2e7d32;
  color:white;
  padding:12px 20px;
  border-radius:10px;
  display:none;
  z-index:1000;
}
</style>
</head>

<body>

<header>JADWAL</header>

<main>

<div class="card">
  <label>Tanggal</label>
  <input type="date" id="tanggal">
</div>

<div class="card">
  <label>Pekerjaan</label>
  <input type="text" id="pekerjaan">
</div>

<div class="card">
  <label>Lokasi</label>
  <input type="text" id="lokasi">
</div>

<div class="card">
  <label>Pilih Karyawan</label>
  <div class="list" id="karyawanList"></div>
</div>

<div class="card">
  <button onclick="kirim()">SIMPAN JADWAL</button>
</div>

</main>

<div id="loading">Menyimpan...</div>
<div id="toast">✔ Berhasil</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbx8VuQ6Ix93I3ipPbecxw2yO8YaFlwIBAdlyzQ3Y4i_9xYIB7qiufusezYZdbm53k2a/exec";
let isLoading = false;

// default tanggal
document.getElementById("tanggal").valueAsDate = new Date();

// =====================
// TOGGLE CARD
// =====================
function toggleCheck(el) {
  const checkbox = el.querySelector("input");
  checkbox.checked = !checkbox.checked;

  el.classList.toggle("active", checkbox.checked);
}

// =====================
// LOAD KARYAWAN
// =====================
async function loadKaryawan() {
  try {
    const res = await fetch(URL + "?action=karyawan");
    const json = await res.json();

    if (json.status !== "success") return;

    const container = document.getElementById("karyawanList");
    container.innerHTML = "";

    json.data.forEach(nama => {
      const el = document.createElement("div");
      el.className = "karyawan-item";

      el.innerHTML = `
        <input type="checkbox" value="${nama}">
        <span>${nama}</span>
      `;

      el.onclick = () => toggleCheck(el);

      container.appendChild(el);
    });

  } catch (e) {
    showToast("Gagal load karyawan", false);
  }
}

loadKaryawan();

// =====================
// HELPER
// =====================
function showLoading(state) {
  document.getElementById("loading").style.display = state ? "flex" : "none";
}

function showToast(msg, success = true) {
  const el = document.getElementById("toast");
  el.innerText = msg;
  el.style.background = success ? "#2e7d32" : "#333";
  el.style.display = "block";

  setTimeout(() => {
    el.style.display = "none";
  }, 2000);
}

function getKaryawan() {
  const checked = document.querySelectorAll('.karyawan-item input:checked');
  return Array.from(checked).map(el => el.value).join(", ");
}

// =====================
// KIRIM
// =====================
async function kirim() {
  if (isLoading) return;

  const tanggal = document.getElementById("tanggal").value;
  const pekerjaan = document.getElementById("pekerjaan").value;
  const lokasi = document.getElementById("lokasi").value;
  const karyawan = getKaryawan();

  if (!tanggal) return showToast("Tanggal wajib", false);
  if (!pekerjaan) return showToast("Pekerjaan wajib", false);
  if (!lokasi) return showToast("Lokasi wajib", false);
  if (!karyawan) return showToast("Pilih karyawan", false);

  const data = {
    jenis: "JADWAL",
    tanggal,
    pekerjaan,
    lokasi,
    karyawan
  };

  try {
    isLoading = true;
    showLoading(true);

    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    await res.json();

    showLoading(false);
    showToast("✔ Jadwal tersimpan");

    // reset
    document.getElementById("pekerjaan").value = "";
    document.getElementById("lokasi").value = "";
    document.querySelectorAll('.karyawan-item input').forEach(el => {
      el.checked = false;
      el.parentElement.classList.remove("active");
    });

  } catch (err) {
    showLoading(false);
    showToast("Gagal koneksi", false);
  } finally {
    isLoading = false;
  }
}
</script>

</body>
</html>
