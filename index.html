<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUSU Dashboard</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<style>
:root {
  --primary: #2e7d32;
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #333;
  --muted: #777;
}

* { box-sizing: border-box; }

body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
}

/* HEADER */
header {
  background: linear-gradient(135deg, #2e7d32, #43a047);
  color:white;
  padding:18px;
  text-align:center;
  font-weight:600;
}

/* MAIN */
main {
  padding:15px;
  max-width:520px;
  margin:auto;
  padding-bottom:90px;
}

/* CARD */
.card {
  background: var(--card);
  padding:16px;
  border-radius:14px;
  margin-bottom:15px;
  box-shadow:0 6px 14px rgba(0,0,0,0.06);
}

.card h3 {
  margin:0 0 10px;
  color: var(--muted);
}

/* JADWAL */
.jadwal-item {
  padding:12px;
  border-radius:10px;
  background:#fafafa;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn-check {
  background: var(--primary);
  color:white;
  border:none;
  width:34px;
  height:34px;
  border-radius:50%;
}

/* SALDO */
.big {
  font-size:28px;
  font-weight:bold;
}

/* UTANG */
.utang-item {
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px dashed #eee;
}

/* MENU */
.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  border-top: 1px solid #ddd;
}

.menu button {
  flex: 1;
  padding: 10px 5px;
  border: none;
  background: white;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  position:relative;
  overflow:hidden;
}

.menu button span.icon {
  font-size:18px;
}

.menu button span.label {
  font-size:11px;
  color:#777;
}

.menu button.active span.label {
  color:#2e7d32;
  font-weight:bold;
}

.menu button:active {
  transform: scale(0.9);
}

/* ripple */
.menu button::after {
  content:"";
  position:absolute;
  width:0;
  height:0;
  background:rgba(46,125,50,0.2);
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  transition:0.4s;
}

.menu button:active::after {
  width:120px;
  height:120px;
}

/* LOADING */
#loading {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  align-items:center;
  justify-content:center;
}

.loader {
  width:40px;
  height:40px;
  border:4px solid white;
  border-top:4px solid var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<header>BUSU DASHBOARD</header>

<main>

<div class="card">
  <h3>Jadwal Aktif</h3>
  <div id="jadwalList"></div>
</div>

<div class="card">
  <h3>Saldo</h3>
  <div id="saldo" class="big">Rp 0</div>
</div>

<div class="card">
  <h3>Total Utang</h3>
  <div id="utangList"></div>
</div>

</main>

<!-- MENU -->
<div class="menu">
  <button onclick="navigate(event,'index.html')" data-page="index">
    <span class="icon">🏠</span>
    <span class="label">Dashboard</span>
  </button>

  <button onclick="navigate(event,'pencatatan.html')" data-page="pencatatan">
    <span class="icon">💰</span>
    <span class="label">Pencatatan</span>
  </button>

  <button onclick="navigate(event,'bayar.html')" data-page="utang">
    <span class="icon">💸</span>
    <span class="label">Utang</span>
  </button>

  <button onclick="navigate(event,'jadwal.html')" data-page="jadwal">
    <span class="icon">📅</span>
    <span class="label">Jadwal</span>
  </button>
</div>

<div id="loading"><div class="loader"></div></div>

<script>
const URL = "URL_WEB_APP_KAMU";

let lastInteraction = Date.now();

// detect activity
["click","scroll","touchstart"].forEach(e=>{
  window.addEventListener(e,()=>lastInteraction=Date.now());
});

function formatRupiah(n){
  return "Rp " + Number(n||0).toLocaleString("id-ID");
}

function showLoading(s){
  document.getElementById("loading").style.display = s ? "flex":"none";
}

// LOAD
async function loadDashboard(silent=false){
  if(!silent) showLoading(true);

  const res = await fetch(URL+"?action=dashboard");
  const json = await res.json();
  const data = json.data;

  renderJadwal(data.jadwal);
  renderSaldo(data.saldo);
  renderUtang(data.utang);

  if(!silent) showLoading(false);
}

// RENDER
function renderJadwal(list){
  const el = document.getElementById("jadwalList");
  el.innerHTML="";

  if(list.length===0){
    el.innerHTML="<small>Tidak ada jadwal</small>";
    return;
  }

  list.forEach(j=>{
    el.innerHTML+=`
      <div class="jadwal-item">
        <div>
          <b>${j.pekerjaan}</b><br>
          <small>${j.lokasi} • ${j.karyawan}</small>
        </div>
        <button class="btn-check" onclick="selesai(${j.row})">✔</button>
      </div>
    `;
  });
}

function renderSaldo(v){
  document.getElementById("saldo").innerText = formatRupiah(v);
}

function renderUtang(list){
  const el = document.getElementById("utangList");
  el.innerHTML="";

  list.forEach(u=>{
    el.innerHTML+=`
      <div class="utang-item">
        <span>${u.nama}</span>
        <b>${formatRupiah(u.total)}</b>
      </div>
    `;
  });
}

// SELESAI
async function selesai(row){
  showLoading(true);
  await fetch(URL+"?action=selesai&row="+row);
  lastInteraction = Date.now();
  await loadDashboard(true);
  showLoading(false);
}

// NAVIGASI
function navigate(e,page){
  setActive(e.currentTarget);
  setTimeout(()=>window.location.href=page,120);
}

function setActive(btn){
  document.querySelectorAll(".menu button")
    .forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// detect page
(function(){
  const path = window.location.pathname;
  document.querySelectorAll(".menu button").forEach(btn=>{
    if(path.includes(btn.dataset.page)){
      btn.classList.add("active");
    }
  });
})();

// AUTO REFRESH
setInterval(()=>{
  if(Date.now()-lastInteraction > 10000){
    loadDashboard(true);
  }
},20000);

// INIT
loadDashboard();

// SW REGISTER
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/busu/service-worker.js");
}
</script>

</body>
</html>
