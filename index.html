<!DOCTYPE html>
<html lang="id">
<head>
  
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32"> 
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUSU Dashboard</title>

<style>
:root {
  --primary: #2e7d32;
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #333;
  --muted: #777;
}

* { box-sizing: border-box; }

body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  background: linear-gradient(135deg, #2e7d32, #43a047);
  color:white;
  padding:18px;
  text-align:center;
  font-weight:600;
  font-size:18px;
}

/* MAIN */
main {
  padding:15px;
  max-width:520px;
  margin:auto;
  padding-bottom:90px;
}

/* CARD */
.card {
  background: var(--card);
  padding:16px;
  border-radius:14px;
  margin-bottom:15px;
  box-shadow:0 6px 14px rgba(0,0,0,0.06);
}

.card h3 {
  margin:0 0 10px 0;
  font-size:15px;
  color: var(--muted);
}

/* JADWAL */
.jadwal-item {
  padding:12px;
  border-radius:10px;
  background:#fafafa;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn-check {
  background: var(--primary);
  color:white;
  border:none;
  width:34px;
  height:34px;
  border-radius:50%;
  cursor:pointer;
}

.btn-check:active {
  transform: scale(0.9);
}

/* SALDO */
.big {
  font-size:28px;
  font-weight:700;
}

/* UTANG */
.utang-item {
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px dashed #eee;
}

/* MENU (UPGRADE) */
.menu {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:white;
  display:flex;
  border-top:1px solid #ddd;
}

.menu button {
  flex:1;
  padding:10px;
  border:none;
  background:white;
  font-size:11px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
}

.menu button.active {
  color: var(--primary);
  font-weight:bold;
}

.menu button:active {
  transform: scale(0.9);
}

/* ripple */
.menu button::after {
  content:"";
  position:absolute;
  width:0;
  height:0;
  background:rgba(46,125,50,0.2);
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  transition:0.4s;
}

.menu button:active::after {
  width:120px;
  height:120px;
}

/* LOADING */
#loading {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.loader {
  width:40px;
  height:40px;
  border:4px solid #fff;
  border-top:4px solid var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<header>BUSU DASHBOARD</header>

<main>

<div class="card">
  <h3>Jadwal Aktif</h3>
  <div id="jadwalList"></div>
</div>

<div class="card">
  <h3>Saldo</h3>
  <div id="saldo" class="big">Rp 0</div>
</div>

<div class="card">
  <h3>Total Utang</h3>
  <div id="utangList"></div>
</div>

</main>

<!-- MENU UPGRADE -->
<div class="menu">
  <button onclick="navigate(event,'pencatatan.html')" data-page="pencatatan">
    💰 <span>Pencatatan</span>
  </button>
  <button onclick="navigate(event,'bayar.html')" data-page="bayar">
    💸 <span>Utang</span>
  </button>
  <button onclick="navigate(event,'jadwal.html')" data-page="jadwal">
    📅 <span>Jadwal</span>
  </button>
</div>

<div id="loading"><div class="loader"></div></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbx8VuQ6Ix93I3ipPbecxw2yO8YaFlwIBAdlyzQ3Y4i_9xYIB7qiufusezYZdbm53k2a/exec";

let lastInteraction = Date.now();
let isLoading = false;

// aktivitas user
["click","scroll","touchstart"].forEach(evt=>{
  window.addEventListener(evt,()=>lastInteraction=Date.now());
});

function formatRupiah(n){
  return "Rp " + Number(n||0).toLocaleString("id-ID");
}

function showLoading(s){
  document.getElementById("loading").style.display = s ? "flex":"none";
}

// =====================
// LOAD DASHBOARD (FIX)
// =====================
async function loadDashboard(silent=false){

  if(isLoading) return; // 🔥 anti double request
  isLoading = true;

  if(!silent){
    setTimeout(()=>showLoading(true),150);
  }

  try{
    const res = await fetch(URL+"?action=dashboard");
    const json = await res.json();
    const data = json.data;

    renderJadwal(data.jadwal);
    renderSaldo(data.saldo);
    renderUtang(data.utang);

  }catch(e){
    console.error(e);
  }

  if(!silent) showLoading(false);

  isLoading = false;
}

// =====================
// RENDER
// =====================
function renderJadwal(list){
  const el = document.getElementById("jadwalList");
  el.innerHTML="";

  if(list.length===0){
    el.innerHTML="<small>Tidak ada jadwal</small>";
    return;
  }

  list.forEach(j=>{
    el.innerHTML+=`
      <div class="jadwal-item">
        <div>
          <b>${j.pekerjaan}</b><br>
          <small>${j.lokasi} • ${j.karyawan}</small>
        </div>
        <button class="btn-check" onclick="selesai(${j.row})">✔</button>
      </div>
    `;
  });
}

function renderSaldo(val){
  document.getElementById("saldo").innerText = formatRupiah(val);
}

function renderUtang(list){
  const el = document.getElementById("utangList");
  el.innerHTML="";

  list.forEach(u=>{
    el.innerHTML+=`
      <div class="utang-item">
        <span>${u.nama}</span>
        <b>${formatRupiah(u.total)}</b>
      </div>
    `;
  });
}

// =====================
// SELESAI (FIX)
// =====================
async function selesai(row){

  if(isLoading) return;

  showLoading(true);
  isLoading = true;

  try{
    await fetch(URL+"?action=selesai&row="+row);
    lastInteraction = Date.now();
    await loadDashboard(true);
  }catch(e){
    console.error(e);
  }

  showLoading(false);
  isLoading = false;
}

// =====================
// NAVIGASI (UPGRADE)
// =====================
function navigate(e,page){
  const btn = e.currentTarget;

  document.querySelectorAll(".menu button")
    .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");

  setTimeout(()=>{
    window.location.href = page;
  },120);
}

// auto active
(function(){
  const path = window.location.pathname;
  document.querySelectorAll(".menu button").forEach(btn=>{
    if(path.includes(btn.dataset.page)){
      btn.classList.add("active");
    }
  });
})();

// =====================
// AUTO REFRESH
// =====================
setInterval(()=>{
  if(Date.now()-lastInteraction > 10000){
    loadDashboard(true);
  }
},20000);

// INIT
loadDashboard();
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
