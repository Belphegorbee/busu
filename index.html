<!DOCTYPE html>
<html lang="id">
<head>
  
 <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32"> 
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUSU Dashboard</title>

<style>
:root {
  --primary: #2e7d32;
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #333;
  --muted: #777;
}

* { box-sizing: border-box; }

body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  background: linear-gradient(135deg, #2e7d32, #43a047);
  color:white;
  padding:18px;
  text-align:center;
  font-weight:600;
  font-size:18px;
}

/* MAIN */
main {
  padding:15px;
  max-width:520px;
  margin:auto;
  padding-bottom:90px;
}

/* CARD */
.card {
  background: var(--card);
  padding:16px;
  border-radius:14px;
  margin-bottom:15px;
  box-shadow:0 6px 14px rgba(0,0,0,0.06);
}

.card h3 {
  margin:0 0 10px 0;
  font-size:15px;
  color: var(--muted);
}

/* JADWAL */
.jadwal-item {
  padding:12px;
  border-radius:10px;
  background:#fafafa;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.jadwal-info small {
  color: var(--muted);
}

.btn-check {
  background: var(--primary);
  color:white;
  border:none;
  width:34px;
  height:34px;
  border-radius:50%;
  cursor:pointer;
}

/* SALDO */
.big {
  font-size:28px;
  font-weight:700;
}

/* UTANG */
.utang-item {
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px dashed #eee;
}

/* MENU */
.menu {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:white;
  display:flex;
  border-top:1px solid #ddd;
}

.menu button {
  flex:1;
  padding:12px;
  border:none;
  background:white;
  font-size:12px;
}

/* LOADING */
#loading {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.loader {
  width:40px;
  height:40px;
  border:4px solid #fff;
  border-top:4px solid var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<header>BUSU DASHBOARD</header>

<main>

<div class="card">
  <h3>Jadwal Aktif</h3>
  <div id="jadwalList"></div>
</div>

<div class="card">
  <h3>Saldo</h3>
  <div id="saldo" class="big">Rp 0</div>
</div>

<div class="card">
  <h3>Total Utang</h3>
  <div id="utangList"></div>
</div>

</main>

<div class="menu">
  <button onclick="go('pencatatan.html')">💰 Pencatatan</button>
  <button onclick="go('bayar.html')">💸 Utang</button>
  <button onclick="go('jadwal.html')">📅 Jadwal</button>
</div>

<div id="loading"><div class="loader"></div></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbx8VuQ6Ix93I3ipPbecxw2yO8YaFlwIBAdlyzQ3Y4i_9xYIB7qiufusezYZdbm53k2a/exec";

let lastInteraction = Date.now();

// deteksi aktivitas user
["click", "scroll", "touchstart"].forEach(evt => {
  window.addEventListener(evt, () => {
    lastInteraction = Date.now();
  });
});

function formatRupiah(n) {
  return "Rp " + Number(n || 0).toLocaleString("id-ID");
}

function showLoading(s) {
  document.getElementById("loading").style.display = s ? "flex" : "none";
}

// =====================
// LOAD DASHBOARD
// =====================
async function loadDashboard(silent=false) {
  if (!silent) showLoading(true);

  try {
    const res = await fetch(URL + "?action=dashboard");
    const json = await res.json();
    const data = json.data;

    renderJadwal(data.jadwal);
    renderSaldo(data.saldo);
    renderUtang(data.utang);

  } catch (e) {
    console.error(e);
  }

  if (!silent) showLoading(false);
}

// =====================
// RENDER
// =====================
function renderJadwal(list) {
  const el = document.getElementById("jadwalList");
  el.innerHTML = "";

  if (list.length === 0) {
    el.innerHTML = "<small>Tidak ada jadwal</small>";
    return;
  }

  list.forEach(j => {
    const div = document.createElement("div");
    div.className = "jadwal-item";

    div.innerHTML = `
      <div>
        <b>${j.pekerjaan}</b><br>
        <small>${j.lokasi} • ${j.karyawan}</small>
      </div>
      <button class="btn-check" onclick="selesai(${j.row})">✔</button>
    `;

    el.appendChild(div);
  });
}

function renderSaldo(val) {
  document.getElementById("saldo").innerText = formatRupiah(val);
}

function renderUtang(list) {
  const el = document.getElementById("utangList");
  el.innerHTML = "";

  list.forEach(u => {
    const div = document.createElement("div");
    div.className = "utang-item";

    div.innerHTML = `
      <span>${u.nama}</span>
      <b>${formatRupiah(u.total)}</b>
    `;

    el.appendChild(div);
  });
}

// =====================
// SELESAI
// =====================
async function selesai(row) {
  showLoading(true);

  await fetch(URL + "?action=selesai&row=" + row);

  lastInteraction = Date.now(); // reset aktivitas
  await loadDashboard(true);

  showLoading(false);
}

// =====================
// NAVIGASI
// =====================
function go(page) {
  window.location.href = page;
}

// =====================
// SMART AUTO REFRESH
// =====================
setInterval(() => {
  const now = Date.now();

  // hanya refresh kalau user idle > 10 detik
  if (now - lastInteraction > 10000) {
    loadDashboard(true);
  }
}, 20000);

// INIT
loadDashboard();
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("SW registered"))
    .catch(err => console.log("SW failed", err));
}
</script>

</body>
</html>
